name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  api-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (test subset)
        run: |
          python -m pip install --upgrade pip
          pip install "SQLAlchemy==2.0.36" "pydantic==2.10.4" "pydantic-settings==2.7.1" "pytest==8.3.4"
      - name: Run eval harness (extraction precision/recall, routing accuracy, governance, determinism)
        run: python -m pytest -q

      # Hard rule (M5): a compile that leaves a skill unroutable fails CI.
      - name: Resolver lint — no dark capabilities
        run: |
          python - <<'PY'
          from apps.api.config import get_settings
          from apps.api.models.db import SessionLocal, init_db
          from apps.api.services.pipeline import run_full_pipeline
          from apps.api.resolver.resolver import lint_resolver
          import os
          os.environ.setdefault("LLM_PROVIDER", "fixture")
          init_db()
          org = get_settings().default_org_id
          db = SessionLocal()
          run_full_pipeline(db, org)
          unroutable = lint_resolver(db, org)
          assert not unroutable, f"Unroutable skills (dark capabilities): {unroutable}"
          print("Resolver lint OK — all skills routable")
          PY
